model:
  device: cpu
  path: models/yolo11n.pt
  confidence: 0.32

runtime:
  frame_skip: 0
  adaptive_frame_skip: false
  target_processing_fps: 8.0
  resize_width: 960
  resize_height: 0

tracking:
  type: bytetrack
  high_score_threshold: 0.5
  low_score_threshold: 0.1
  new_track_score_threshold: 0.55
  match_iou_threshold: 0.35
  secondary_match_iou_threshold: 0.12
  max_age_frames: 20
  min_hits: 3
  trajectory_prediction_enabled: true
  trajectory_history_size: 8
  trajectory_prediction_horizon: 4
  trajectory_smoothing: 0.7

output:
  save_annotated_video: false
